  release:
    name: Create Release
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases and uploading assets
      actions: read    # Required for downloading artifacts
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: telegram-download-chat-windows
        path: artifacts/windows

    # - name: Download macOS artifact
    #   uses: actions/download-artifact@v4
    #   with:
    #     name: telegram-download-chat-macos
    #     path: artifacts/macos

    - name: Get version from tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Generate release notes
      id: release_notes
      uses: orhun/git-cliff-action@v4
      with:
        config: cliff.toml
        args: --latest --strip header
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate release title
      id: release_title
      run: |
        RAW=$(git-cliff --latest --strip all --body '{% for group, commits in commits | group_by(attribute="group") %}{% if group is containing("Features") %}{% for commit in commits %}{% if commit.scope %}{{ commit.scope | upper_first }}{% else %}{{ commit.message | upper_first }}{% endif %}|{% endfor %}{% endif %}{% endfor %}' 2>/dev/null || true)
        TITLE=$(echo "$RAW" | tr '|' '\n' | grep -v '^$' | awk '!seen[$0]++' | head -4 | paste -sd '&' | sed 's/&/ \& /g')
        if [ ${#TITLE} -gt 60 ]; then TITLE="${TITLE:0:57}..."; fi
        if [ -z "$TITLE" ]; then TITLE="Bugfix Release"; fi
        echo "title=$TITLE" >> $GITHUB_OUTPUT

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref }}
        name: "v${{ steps.get_version.outputs.version }}: ${{ steps.release_title.outputs.title }}"
        body: ${{ steps.release_notes.outputs.content }}
        draft: false
        prerelease: false
        files: |
          artifacts/windows/telegram-download-chat.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
