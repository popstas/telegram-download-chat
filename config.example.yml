settings:
  # Required API credentials - get these from https://my.telegram.org/apps
  api_id: YOUR_API_ID
  api_hash: YOUR_API_HASH

  # Other settings are optional

  # Path where downloaded chats will be saved
  save_path: ./data/chats
  
  # Default number of messages to fetch per API request (50-1000)
  fetch_limit: 500
  
  # Session file settings
  session_name: session

  # Wait time between API requests (in seconds)
  request_delay: 0.1
  # Maximum number of retries for failed requests
  max_retries: 5
  
  # Log file path (empty for console only)
  log_file: ./data/telegram_downloader.log
  # Log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  log_level: INFO

  # GUI: help for the "Chat" field (which identifier to type). Both default on.
  # gui_chat_hint_tooltip: true   # info icon + hover tooltip next to the field
  # gui_chat_hint_help: true      # collapsible "How to fill this?" block

  # Optional proxy URL for Telegram connections
  # Supported schemes: socks5, socks4, http, https
  # proxy_url: socks5://user:password@proxy-host:1080

  # Parallel media download tuning (default on for files above the threshold).
  # Multiple MTProto connections per file dramatically increase per-file
  # download speed, especially for Telegram Premium accounts.
  # fast_download: true
  # media_parallel_connections: 4   # auto-detected if omitted (Premium=8, free=4)
  # media_parallel_threshold_mb: 1  # smaller files use the single-stream path

# Optional mapping for overriding user and bot full names
# Names are fetched automatically and stored here
users_map:
  123456: "Alice"
  789012: "Bob"

# Optional mapping for overriding group or channel titles
# Titles for groups and channels are fetched automatically
chats_map:
  100123456: "MyGroup"

# Optional presets for frequently used argument combinations
presets:
  - name: short
    args:
      limit: 100
  - name: yearly
    args:
      split: year
